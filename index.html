<!DOCTYPE html>
<html>
<head>
<title>Cloud VM Project</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.container{
margin-top:120px;
animation: fadeIn 2s;
}

h1{
font-size:50px;
}

h2{
color:#ffd700;
}

.cloud{
font-size:80px;
animation: float 3s infinite ease-in-out;
}

.button{
background:white;
color:#2a5298;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.button:hover{
background:#ffd700;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0px);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.footer{
position:fixed;
bottom:10px;
width:100%;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="cloud">☁️</div>

<h1>Hello from Cloud VM</h1>

<h2>Deployed by Anushka Kolapkar</h2>

<p>Virtual Machine Hosted Web Server Project</p>

<p>Server: Ubuntu VM | Web Server: Apache</p>

<br>

<a class="button">Cloud Computing Project</a>

</div>

<div class="footer">
Cloud Infrastructure Project | 2026
</div>

</body>
</html>
